<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Thank you · Mama Bakery</title>
<link rel="icon" href="images/favicon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="images/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/styles.css" />
<style>
  .thanks{min-height:100vh;display:grid;place-items:center;text-align:center;padding:40px 24px}
  .thanks .card{max-width:560px;background:#fff;border-radius:30px;padding:54px 40px;box-shadow:var(--shadow)}
  .thanks .leaf-big{width:84px;height:84px;margin:0 auto 24px;display:block}
  .thanks h1{font-size:clamp(2rem,4vw,2.8rem);margin-bottom:14px}
  .thanks h1 em{font-style:italic;color:var(--apricot-deep)}
  .thanks p{color:var(--ink-soft);font-size:1.08rem;margin-bottom:30px}
  .thanks .btn{font-size:1rem}
</style>
</head>
<body>
  <div class="thanks">
    <div class="card">
      <img class="leaf-big" src="images/logo-icon.svg" alt="Mama Bakery" />
      <h1>Thank you — <em>message received!</em></h1>
      <p>We'll get back to you within a day to start planning something sweet. 🎂</p>
      <a class="btn" href="/">← Back to Mama Bakery</a>
    </div>
  </div>
</body>
</html>
